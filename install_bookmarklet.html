<title>Install Bookmarklet</title>
<style>
body { font-family: "Inter", system-ui, sans-serif; background: #f2f2f0; display: flex;
  justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #1a1a1a; }
.card { background: #fff; border: 1px solid #d4d4d4; border-radius: 4px; padding: 48px;
  max-width: 440px; text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
h1 { font-size: 32px; font-weight: 400; letter-spacing: -0.02em; margin: 0 0 12px 0; }
p { font-size: 14px; line-height: 1.6; color: #6b6b6b; margin: 0 0 32px 0; }
.bm-link { 
  display: inline-block; 
  padding: 20px 48px; 
  background: #111;
  font-family: "Space Mono", monospace; 
  font-size: 18px;
  text-decoration: none; 
  border-radius: 4px; 
  cursor: grab;
  transition: transform 0.12s, box-shadow 0.12s;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  
  /* Hide the real text but keep it selectable for the browser */
  color: transparent;
  position: relative;
  text-align: center;
}

.bm-link::after {
  content: "Drag to bookmarks bar";
  color: #fff; /* Make this text visible */
  position: absolute;
  left: 0;
  right: 0;
}

.bm-link:hover { 
  transform: translateY(-2px); 
  box-shadow: 0 8px 24px rgba(0,0,0,0.2); 
}
.hint { font-size: 12px; color: #a3a3a3; margin-top: 16px; }

.instructions {
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid #f2f2f0;
  text-align: left;
}

.instructions ol {
  padding-left: 20px;
  margin: 0;
  color: #6b6b6b;
  font-size: 14px;
  line-height: 1.6;
}

.instructions li {
  margin-bottom: 12px;
  padding-left: 8px;
}

.instructions li::marker {
  font-family: "Space Mono", monospace;
  color: #1a1a1a;
}

.instructions a {
  color: #1a1a1a;
  text-decoration: underline;
  text-decoration-color: #d4d4d4;
  text-underline-offset: 4px;
  transition: text-decoration-color 0.15s ease;
}

.instructions a:hover {
  text-decoration-color: #1a1a1a;
}
</style>
