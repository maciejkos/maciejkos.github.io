        <title>Install Bookmarklet</title>
        <style>
            body {
                font-family: "Inter", system-ui, sans-serif;
                background: #f2f2f0;
                display: flex;
                justify-content: center;
                align-items: flex-start; /* Stops vertical centering */
                padding-top: 15vh; /* Sets a fixed position from the top */
                min-height: 100vh;
                margin: 0;
                color: #1a1a1a;
                box-sizing: border-box; /* Ensures padding respects min-height */
            }

            .card {
                background: #fff;
                border: 1px solid #d4d4d4;
                border-radius: 4px;
                padding: 48px;
                max-width: 440px;
                text-align: center;
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            }

            h1 {
                font-family: "Sacramento", cursive;
                font-size: 60px;
                font-weight: 400;
                /*font-size: 32px;*/
                /*font-weight: 400;*/
                /*letter-spacing: -0.02em;*/
                margin: 0 0 1px 0;
                /*letter-spacing:-0.02em;\*/
                /*line-height:1;\*/
                /*color:#1a1a1a;\*/
                /*text-decoration:none;\*/
                /*cursor:pointer;\*/
                /*position:relative;\*/
                /*top:12px;\*/
            }

            p {
                font-size: 14px;
                line-height: 1.6;
                color: #6b6b6b;
                margin: 0 0 32px 0;
            }

            .bm-link {
                display: inline-block;
                padding: 20px 48px;
                background: #111;
                font-family: "Space Mono", monospace;
                font-size: 18px;
                text-decoration: none;
                border-radius: 4px;
                cursor: grab;
                transition:
                    transform 0.12s,
                    box-shadow 0.12s;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
                color: transparent;
                position: relative;
                text-align: center;
            }

            .bm-link::after {
                content: "Drag to bookmarks bar";
                color: #fff;
                position: absolute;
                left: 0;
                right: 0;
            }

            .bm-link:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            }

            /* ── Shared: shortcut table ── */
            .shortcut-table {
                display: table;
                font-size: 13px;
                line-height: 2;
                color: #6b6b6b;
                margin: 0;
            }

            .shortcut-row {
                display: table-row;
            }

            .shortcut-label {
                display: table-cell;
                padding-right: 12px;
                white-space: nowrap;
                color: #1a1a1a;
                font-size: 13px;
                vertical-align: baseline;
            }

            .shortcut-keys {
                display: table-cell;
                vertical-align: baseline;
            }

            kbd {
                font-family: "Space Mono", monospace;
                font-size: 11px;
                background: #fff;
                border: 1px solid #d4d4d4;
                border-radius: 3px;
                padding: 1px 5px;
                color: #1a1a1a;
                white-space: nowrap;
            }

            .os-note {
                color: #a3a3a3;
                font-size: 12px;
            }

            /* ── Option 2: Collapsible disclosure ── */
            .disclosure {
                margin-top: 20px;
                text-align: center;
            }

            .disclosure details {
                display: inline-block;
                text-align: left;
                vertical-align: top;
            }

            .disclosure summary {
                font-size: 13px;
                color: #a3a3a3;
                cursor: pointer;
                list-style: none;
                text-align: center;
                transition: color 0.15s ease;
            }

            .disclosure summary::-webkit-details-marker {
                display: none;
            }

            .disclosure summary::before {
                content: "▸ ";
                font-size: 10px;
                display: inline-block;
                transition: transform 0.15s ease;
                vertical-align: middle;
                transform-origin: center;
            }

            .disclosure details[open] summary::before {
                transform: rotate(90deg);
            }

            .disclosure summary:hover {
                color: #1a1a1a;
            }

            .disclosure .shortcut-panel {
                margin-top: 12px;
                padding: 14px 18px;
                background: #fafaf9;
                border: 1px solid #e8e8e6;
                border-radius: 3px;
            }

            /* ── Shortcut Panel Styles ── */
            .shortcut-group-title {
                display: block;
                margin-bottom: 8px;
                color: #1a1a1a;
                font-size: 13px;
            }

            .shortcut-list {
                display: flex;
                flex-direction: column;
                /* Controls the vertical gap between rows (e.g., Win vs Mac) */
                gap: 6px;
                margin-bottom: 16px;
                /* Pushes the vertical line/bullets to the right */
                margin-left: 12px;
                /* Space between the vertical line and the shortcut text */
                padding-left: 12px;
                border-left: 2px solid #e8e8e6;
            }

            .shortcut-list:last-child {
                margin-bottom: 0;
            }

            .shortcut-item {
                display: flex;
                align-items: center;
                font-size: 13px;
                color: #6b6b6b;
            }

            .os-name {
                /* Controls width of "Win:" / "Mac:" so columns align */
                width: 44px;
                color: #a3a3a3;
                font-size: 12px;
            }

            .keys-group {
                display: flex;
                align-items: center;
                /* Space between the keyboard keys and the "+" markers */
                gap: 4px;
            }

            .kbd-fixed {
                /* Fixed width for Ctrl and Cmd so Shift keys align perfectly */
                width: 32px;
                text-align: center;
            }

            /* ── Instructions ── */
            .instructions {
                margin-top: 24px;
                padding-top: 24px;
                border-top: 1px solid #f2f2f0;
                text-align: left;
            }

            .instructions ol {
                padding-left: 20px;
                margin: 0;
                color: #6b6b6b;
                font-size: 14px;
                line-height: 1.6;
            }

            .instructions li {
                margin-bottom: 12px;
                padding-left: 8px;
            }

            .instructions li::marker {
                font-family: "Space Mono", monospace;
                color: #1a1a1a;
            }

            .instructions a {
                color: #1a1a1a;
                text-decoration: underline;
                text-decoration-color: #d4d4d4;
                text-underline-offset: 4px;
                transition: text-decoration-color 0.15s ease;
            }

            .instructions a:hover {
                text-decoration-color: #1a1a1a;
            }

            /* ── Option 3: Prerequisite step ── */
            .prerequisite {
                background: #fafaf9;
                border-left: 2px solid #d4d4d4;
